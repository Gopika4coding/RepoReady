<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoReady Pro</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 800px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
}

.input-group {
    display: flex;
    margin-top: 20px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px 0 0 10px;
    border: none;
    outline: none;
}

button {
    padding: 12px 20px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
    border-radius: 0 10px 10px 0;
}

button:hover {
    background: #4f46e5;
}

.loading {
    text-align: center;
    margin-top: 20px;
    display: none;
}

.result {
    margin-top: 20px;
}
</style>
</head>

<body>
<div class="container">
    <h1>🚀 RepoReady Pro</h1>

    <div class="input-group">
        <input id="repoInput" placeholder="Paste any GitHub URL or owner/repo">
        <button onclick="startAssessment()">Analyze</button>
    </div>

    <div id="loading" class="loading">⏳ Analyzing...</div>
    <div id="result" class="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
