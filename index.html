<body>
    <div class="top-bar">
        <button id="aboutBtn" class="about-btn">About Us</button>

        <div class="theme-toggle">
            <label class="switch">
                <input type="checkbox" id="themeSwitch">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="logo">RepoReady</h1>
            <div class="badge">
                <span>LIVE ASSESSMENT</span>
                <span>V1.0.0</span>
            </div>
            <p class="tagline">Is your software research-ready?</p>
        </div>

        <div class="assessment-card-main">
            <div class="card-content">
                <p class="input-label">ENTER A PUBLIC GITHUB URL TO BEGIN ASSESSMENT</p>
                
                <div class="url-input-group">
                    <input type="text" id="repoInput" class="repo-input" placeholder="Paste full GitHub URL or owner/repo">
                    <button id="assessBtn" class="assess-btn">ASSESS →</button>
                </div>

                <div class="demo-section">
                    <button id="loadLastBtn" class="demo-btn">Load Last Assessment</button>
                </div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing repository...</p>
        </div>

        <div id="result"></div>
    </div>

    <!-- ABOUT MODAL -->
    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <span id="closeAbout">&times;</span>
            <h2>About RepoReady</h2>
            <p>
                RepoReady evaluates GitHub repositories for research readiness.
                It checks documentation, testing, CI/CD, licensing, and more.
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
